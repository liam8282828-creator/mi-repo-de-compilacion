name: iOS Avalonia Compiler

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Nombre de la rama temporal generada por el bot'
        required: true
        type: string
      project_name:
        description: 'Nombre asignado al proyecto'
        required: true
        type: string
      dotnet_version:
        description: 'Versión del SDK de .NET a utilizar'
        required: false
        default: '8.0'
        type: string

jobs:
  build-ios:
    runs-on: macos-14  # Asegura un runner moderno de Apple con Xcode preinstalado
    
    steps:
      - name: 1. Checkout del repositorio (Rama Temporal)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch_name }}

      - name: 2. Instalar SDK de .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ github.event.inputs.dotnet_version }}

      - name: 3. Instalar herramientas de iOS (Workload)
        run: |
          dotnet workload install ios --source https://nuget.org

      - name: 4. Desempaquetar código fuente
        run: |
          if [ -f "source.zip" ]; then
            echo "📦 Archivo source.zip localizado. Descomprimiendo..."
            unzip -q source.zip -d src_extracted
            cd src_extracted
          else
            echo "❌ No se encontró el archivo source.zip en la rama."
            exit 1
          fi

      - name: 5. Localizar archivo .csproj e iniciar restauración
        run: |
          cd src_extracted
          CSPROJ_PATH=$(find . -name "*.csproj" | grep -i "ios" | head -n 1)
          if [ -z "$CSPROJ_PATH" ]; then
            CSPROJ_PATH=$(find . -name "*.csproj" | head -n 1)
          fi
          
          if [ -z "$CSPROJ_PATH" ]; then
            echo "❌ No se encontró ningún archivo .csproj en el ZIP."
            exit 1
          fi
          
          echo "🎯 Proyecto detectado: $CSPROJ_PATH"
          echo "PROJECT_PATH=$CSPROJ_PATH" >> $GITHUB_ENV
          
          dotnet restore "$CSPROJ_PATH"

      - name: 6. Compilar Proyecto (.ipa nativa de iOS)
        run: |
          cd src_extracted
          dotnet publish "${{ env.PROJECT_PATH }}" \
            -c Release \
            -r ios-arm64 \
            /p:ArchiveOnBuild=true \
            /p:BuildIpa=true \
            /p:CodesignAllocate="/Applications/Xcode.app/Contents/Developer/usr/bin/codesign_allocate"

      - name: 7. Localizar archivo .ipa generado
        run: |
          cd src_extracted
          IPA_FILE=$(find . -name "*.ipa" | head -n 1)
          if [ -z "$IPA_FILE" ]; then
            echo "❌ Falló la compilación: No se generó ningún archivo .ipa."
            exit 1
          fi
          echo "✅ .ipa encontrado en: $IPA_FILE"
          
          # Mover el archivo fuera para facilitar la subida como artefacto
          mkdir -p ../output
          cp "$IPA_FILE" "../output/${{ github.event.inputs.project_name }}.ipa"

      - name: 8. Subir .ipa compilado como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.project_name }}-ipa
          path: output/*.ipa
          if-no-files-found: error
          retention-days: 1
